name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app
        run: |
          chmod +x macos/build.sh
          cd macos && ./build.sh

      - name: Create DMG
        run: |
          mkdir -p dmg-contents
          cp -R macos/build/Appreciate.app dmg-contents/
          ln -s /Applications dmg-contents/Applications
          hdiutil create -volname "Appreciate" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            "Appreciate-macOS-${{ inputs.version }}.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "Appreciate-macOS-*.dmg"

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "Appreciate-Android-${{ inputs.version }}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "Appreciate-Android-*.apk"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows EXE
        run: dotnet publish windows/Appreciate.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Rename EXE
        run: |
          copy publish\Appreciate.exe "Appreciate-Windows-${{ inputs.version }}.exe"

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "Appreciate-Windows-*.exe"

  release:
    needs: [build-macos, build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            macos-dmg/Appreciate-macOS-*.dmg
            android-apk/Appreciate-Android-*.apk
            windows-exe/Appreciate-Windows-*.exe
