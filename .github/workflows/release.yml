name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create DMG
        run: |
          mkdir -p dmg-contents
          cp -R build/Appreciate.app dmg-contents/
          ln -s /Applications dmg-contents/Applications
          hdiutil create -volname "Appreciate" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            "Appreciate-${{ inputs.version }}.dmg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: "Appreciate-*.dmg"
