name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app
        run: |
          chmod +x macos/build.sh
          cd macos && ./build.sh

      - name: Create DMG
        run: |
          mkdir -p dmg-contents
          cp -R macos/build/Appreciate.app dmg-contents/
          ln -s /Applications dmg-contents/Applications
          hdiutil create -volname "Appreciate" \
            -srcfolder dmg-contents \
            -ov -format UDZO \
            "Appreciate-macOS-${{ inputs.version }}.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "Appreciate-macOS-*.dmg"

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "Appreciate-Android-${{ inputs.version }}.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "Appreciate-Android-*.apk"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Windows EXE
        run: dotnet publish windows/Appreciate.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Rename EXE
        run: |
          copy publish\Appreciate.exe "Appreciate-Windows-${{ inputs.version }}.exe"

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "Appreciate-Windows-*.exe"
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-gi gir1.2-gtk-4.0 libgtk-4-dev

      - name: Verify syntax
        run: python3 -m py_compile linux/appreciate.py && python3 -m py_compile linux/overlay.py && python3 -m py_compile linux/settings.py

      - name: Package Linux app
        run: |
          mkdir -p Appreciate-Linux
          cp linux/*.py linux/appreciate.desktop Appreciate-Linux/
          echo '#!/bin/bash' > Appreciate-Linux/run.sh
          echo 'cd "$(dirname "$0")" && exec python3 appreciate.py "$@"' >> Appreciate-Linux/run.sh
          chmod +x Appreciate-Linux/run.sh
          tar czf "Appreciate-Linux-${{ inputs.version }}.tar.gz" Appreciate-Linux/

      - name: Upload Linux archive
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: "Appreciate-Linux-*.tar.gz"

  release:
    needs: [build-macos, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Find the previous tag, or use the initial commit if none exists
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Previous ref: $PREV_TAG"

          {
            echo 'CHANGELOG<<EOF'

            # Features
            FEATS=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s' --grep='^feat' | sed 's/^- feat: /- /; s/^- feat(/- (/') || true
            if [ -n "$FEATS" ]; then
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s' --grep='^fix' | sed 's/^- fix: /- /; s/^- fix(/- (/') || true
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other (docs, chore, refactor, style)
            OTHERS=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s' --grep='^docs\|^chore\|^refactor\|^style' | sed 's/^- \(docs\|chore\|refactor\|style\): /- /' || true
            if [ -n "$OTHERS" ]; then
              echo "### 📝 Other"
              echo "$OTHERS"
              echo ""
            fi

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            macos-dmg/Appreciate-macOS-*.dmg
            android-apk/Appreciate-Android-*.apk
            windows-exe/Appreciate-Windows-*.exe
            linux-tar/Appreciate-Linux-*.tar.gz
